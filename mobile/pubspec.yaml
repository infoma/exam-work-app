name: exam_work_app
description: 大型考试工作管理系统移动端
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  flutter_secure_storage: ^9.0.0
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  pull_to_refresh: ^2.0.0
  shimmer: ^3.0.0
  badges: ^3.1.2
  url_launcher: ^6.2.4
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  open_file: ^3.3.2
  permission_handler: ^11.2.0
  path_provider: ^2.1.2
  logger: ^2.0.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/